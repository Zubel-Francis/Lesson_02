<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embracing Minimalism | Blog Card</title>
    <link rel="stylesheet" href="./style.css">
    <link type="icon" rel="icon" href="./assests/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="img">
            <img src="./assests/Cactus.jpg" alt="Cactus">
        </div>
        <div class="content">
            <span class="badge">Design</span>
            <h3>Embracing Minimalism</h3>
            <p>From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
            <div class="author">
                <p>Annie Spratt</p>
            </div>
        </div>
    </div>
</body>
</html>
